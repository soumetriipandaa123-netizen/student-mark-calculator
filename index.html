<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Student Grade Calculator</h1>

        <label>Subject 1 Marks</label>
        <input type="number" id="sub1">

        <label>Subject 2 Marks</label>
        <input type="number" id="sub2">

        <label>Subject 3 Marks</label>
        <input type="number" id="sub3">

        <label>Subject 4 Marks</label>
        <input type="number" id="sub4">

        <label>Subject 5 Marks</label>
        <input type="number" id="sub5">

        <button onclick="calculateResult()">
            Calculate Result
        </button>

        <p id="error"></p>

        <div class="result">
            <h3>Result</h3>

            <p>Total Marks: <span id="total">-</span></p>

            <p>Percentage: <span id="percentage">-</span></p>

            <p>Grade: <span id="grade">-</span></p>

            <p>Status: <span id="status">-</span></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
